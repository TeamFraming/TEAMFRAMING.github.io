<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEAM FRAMING</title>
    <link rel="icon" type="image/png" href="assets/FRAMING.png" />
    <link rel="apple-touch-icon" href="assets/FRAMING.png" />
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@200;300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/index.css" />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #0f0f0f;
        color: #ffffff;
        overflow-x: hidden;
      }

      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding-top: 10vh;
      }

      .main-title {
        font-size: 5.5rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 0.6rem;
        line-height: 1.1;
        min-height: 7rem;
        white-space: nowrap;
        letter-spacing: -0.02em;
      }

      .typing-cursor {
        animation: blink 1s infinite;
        font-weight: 300;
        opacity: 0.5;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 0.5;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      .coming-soon {
        font-size: 1rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.35);
        text-align: center;
        margin-bottom: 7rem;
        letter-spacing: 0.45em;
        text-transform: uppercase;
      }

      .countdown-container {
        text-align: center;
        margin-bottom: 6rem;
      }

      .countdown {
        display: inline-flex;
        align-items: flex-start;
        gap: 0;
        background: none;
        border: none;
        padding: 0;
      }

      .countdown-item {
        text-align: center;
        min-width: 110px;
      }

      .countdown-sep {
        font-family: "Outfit", sans-serif;
        font-size: 2.5rem;
        font-weight: 200;
        color: rgba(255, 255, 255, 0.12);
        line-height: 1;
        padding: 0 0.2rem;
        margin-top: 0.1rem;
        user-select: none;
      }

      .countdown-number {
        font-family: "Outfit", sans-serif;
        font-size: 3rem;
        font-weight: 300;
        display: block;
        line-height: 1;
        margin-bottom: 0.5rem;
        letter-spacing: 0.04em;
        color: #ffffff;
      }

      .countdown-label {
        font-family: "Outfit", sans-serif;
        font-size: 0.55rem;
        color: rgba(255, 255, 255, 0.28);
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-weight: 400;
        display: block;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.2);
        }
      }

      /* Top Right Controls */
      .top-controls {
        position: fixed;
        top: 2rem;
        right: 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        z-index: 1000;
      }

      @media (max-width: 768px) {
        .top-controls {
          top: 1rem;
          right: 1rem;
          gap: 0.5rem;
        }

        .github-link {
          width: 40px;
          height: 40px;
        }

        .github-link svg {
          width: 20px;
          height: 20px;
        }
      }

      /* Top Left Team Logo */
      .team-logo-btn {
        position: fixed;
        top: 2rem;
        left: 2rem;
        z-index: 1001;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        height: 50px; /* top-controls 버튼과 동일한 높이 기준 */
      }

      .team-logo-btn img {
        height: 160px;
        width: auto;
        display: block;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
        filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.5));
      }

      .team-logo-btn:hover img {
        transform: scale(1.06);
        opacity: 0.85;
      }

      @media (max-width: 768px) {
        .team-logo-btn {
          top: 1rem;
          left: 1rem;
        }
        .team-logo-btn img {
          height: 90px;
        }
      }

      .github-link {
        width: 50px;
        height: 50px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      .github-link:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
      }

      .github-link svg {
        width: 24px;
        height: 24px;
        fill: #ffffff;
      }

      /* GitHub Dropdown */
      .github-dropdown {
        position: fixed;
        top: 6rem;
        right: 2rem;
        width: 250px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 12px;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transform: translateY(-10px);
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        z-index: 999;
      }

      .github-dropdown.show {
        transform: translateY(0);
        opacity: 1;
        pointer-events: all;
      }

      .github-option {
        display: flex;
        align-items: center;
        padding: 1rem;
        text-decoration: none;
        color: #ffffff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: background 0.2s ease;
      }

      .github-option:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #ffffff;
      }

      .github-option:last-child {
        border-bottom: none;
      }

      .github-option svg {
        width: 20px;
        height: 20px;
        fill: #ffffff;
        margin-right: 0.75rem;
      }

      .github-info {
        display: flex;
        flex-direction: column;
      }

      .github-name {
        font-weight: 600;
        margin-bottom: 0.2rem;
      }

      .github-role {
        font-size: 0.8rem;
        color: #888888;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .hero-section {
          align-items: center !important;
          padding: 0 !important;
          justify-content: center !important;
        }

        .main-title {
          font-size: 3rem;
          min-height: 4.5rem;
          margin-bottom: 1.2rem;
          white-space: nowrap;
          overflow: hidden;
        }

        .coming-soon {
          font-size: 0.65rem;
          margin-bottom: 3rem;
        }

        .countdown-item {
          min-width: 70px;
        }

        .countdown-number {
          font-size: 3.2rem;
        }

        .countdown-sep {
          font-size: 2.5rem;
        }
      }

      @media (max-width: 480px) {
        .hero-section {
          align-items: center !important;
          padding: 0 !important;
          justify-content: center !important;
        }

        .main-title {
          font-size: 2rem;
          min-height: 3.5rem;
          margin-bottom: 1rem;
          white-space: nowrap;
          overflow: hidden;
        }

        .coming-soon {
          font-size: 0.6rem;
          margin-bottom: 2.5rem;
        }

        .countdown-item {
          min-width: 52px;
        }

        .countdown-number {
          font-size: 2.2rem;
        }

        .countdown-sep {
          font-size: 1.8rem;
        }
      }
    </style>

    <div class="hero-section">
      <div class="container">

              <span class="typing-cursor">|</span>

            <!-- Countdown -->

                  <span class="countdown-number" id="days">00</span>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // 타이핑 효과: AI HEALTHCARE -> TEAMFRAMING -> SURGIFLOW 순환
      function typeText() {
        const CONFIG = {
          texts: ["AI HEALTHCARE", "TEAMFRAMING", "SURGIFLOW"],
          el: document.getElementById("typing-text"),
          modes: {
            normal: { type: 100, del: 60, waitType: 2500, waitDel: 500 },
            attack: { type: 60, del: 30, waitType: 600, waitDel: 120 },
          },
        };

        const params = new URLSearchParams(window.location.search);
        const isAttack =
          params.get("timeattack") === "1" ||
          params.get("timeattack") === "true";
        const timing = CONFIG.modes[isAttack ? "attack" : "normal"];

        let state = { textIdx: 0, charIdx: 0, isDeleting: false };

        function tick() {
          const fullText = CONFIG.texts[state.textIdx];
          const { charIdx, isDeleting } = state;

          // 1. 상태 전환
          if (!isDeleting && charIdx === fullText.length) {
            state.isDeleting = true;
            return setTimeout(tick, timing.waitType);
          }

          if (isDeleting && charIdx === 0) {
            state.isDeleting = false;
            state.textIdx = (state.textIdx + 1) % CONFIG.texts.length;
            return setTimeout(tick, timing.waitDel);
          }

          // 2. 타이핑 및 UI 업데이트
          state.charIdx += isDeleting ? -1 : 1;
          CONFIG.el.textContent = fullText.substring(0, state.charIdx);

          setTimeout(tick, isDeleting ? timing.del : timing.type);
        }

        tick();
      }

      /**
       * 카운트 다운 타이머
       */
      function updateCountdown() {
        const KEYS = {
          MODE: "tf_mode",
          LAUNCH: "tf_launch",
          ATTACK: "tf_attack_sec",
        };

        const params = new URLSearchParams(window.location.search);
        const isAttack =
          params.get("timeattack") === "1" ||
          params.get("timeattack") === "true";
        const attackSec = Number(params.get("timeattack_seconds") || 30);

        const getLaunchTime = () => {
          const now = Date.now();
          try {
            const sMode = localStorage.getItem(KEYS.MODE);
            const sLaunch = Number(localStorage.getItem(KEYS.LAUNCH));
            const sSec = Number(localStorage.getItem(KEYS.ATTACK));

            const match = isAttack
              ? sMode === "attack" && sSec === attackSec
              : sMode === "default";

            if (match && !isNaN(sLaunch)) return sLaunch;

            const newLaunch =
              now + (isAttack ? attackSec : 40 * 24 * 3600) * 1000;
            localStorage.setItem(KEYS.MODE, isAttack ? "attack" : "default");
            localStorage.setItem(KEYS.LAUNCH, newLaunch);
            if (isAttack) localStorage.setItem(KEYS.ATTACK, attackSec);
            else localStorage.removeItem(KEYS.ATTACK);
            return newLaunch;
          } catch {
            return now + (isAttack ? attackSec : 40 * 24 * 3600) * 1000;
          }
        };

        const launchMs = getLaunchTime();
        const units = [
          { id: "days", ms: 86400000 },
          { id: "hours", ms: 3600000 },
          { id: "minutes", ms: 60000 },
          { id: "seconds", ms: 1000 },
        ];

        const timer = setInterval(() => {
          const distance = launchMs - Date.now();
          if (distance < 0) {
            clearInterval(timer);
            document.querySelector(".countdown").innerHTML =
              "<h2>LAUNCHED!</h2>";
            return;
          }

          let rem = distance;
          units.forEach((u) => {
            const val = Math.floor(rem / u.ms);
            rem %= u.ms;
            document.getElementById(u.id).textContent = String(
              Math.max(0, val),
            ).padStart(2, "0");
          });
        }, 1000);
      }

      /**
       * UI 이벤트 리스너 초기화
       */
      function initEvents() {
        const dropdown = document.getElementById("githubDropdown");
        const actions = {
          toggle: (e) => {
            e.stopPropagation();
            dropdown.classList.toggle("show");
          },
          close: () => dropdown.classList.remove("show"),
          reload: (e) => {
            e.stopPropagation();
            location.reload();
          },
        };

        const bindings = [
          { id: "githubToggle", type: "click", act: actions.toggle },
          { id: "teamLogoBtn", type: "click", act: actions.reload },
          { target: document, type: "click", act: actions.close },
        ];

        bindings.forEach((b) => {
          const el = b.target || document.getElementById(b.id);
          if (el) el.addEventListener(b.type, b.act);
        });
      }

      // 페이지 로드 시 모든 기능 초기화
      document.addEventListener("DOMContentLoaded", () => {
        typeText();
        updateCountdown();
        initEvents();
      });
    </script>
