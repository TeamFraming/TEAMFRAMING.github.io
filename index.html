<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEAM FRAMING</title>
    <link rel="icon" type="image/png" href="assets/FRAMING.png">
    <link rel="apple-touch-icon" href="assets/FRAMING.png">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            overflow-x: hidden;
        }

        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-top: 10vh;
        }

        .main-title {
            font-size: 5.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.6rem;
            line-height: 1.1;
            min-height: 7rem;
            white-space: nowrap;
            letter-spacing: -0.02em;
        }

        .typing-cursor {
            animation: blink 1s infinite;
            font-weight: 300;
            opacity: 0.5;
        }

        @keyframes blink {
            0%, 50% { opacity: 0.5; }
            51%, 100% { opacity: 0; }
        }

        .coming-soon {
            font-size: 1rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            margin-bottom: 7rem;
            letter-spacing: 0.45em;
            text-transform: uppercase;
        }

        .countdown-container {
            text-align: center;
            margin-bottom: 6rem;
        }

        .countdown {
            display: inline-flex;
            align-items: flex-start;
            gap: 0;
            background: none;
            border: none;
            padding: 0;
        }

        .countdown-item {
            text-align: center;
            min-width: 110px;
        }

        .countdown-sep {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 200;
            color: rgba(255, 255, 255, 0.12);
            line-height: 1;
            padding: 0 0.2rem;
            margin-top: 0.1rem;
            user-select: none;
        }

        .countdown-number {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 300;
            display: block;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: 0.04em;
            color: #ffffff;
        }

        .countdown-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.28);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 400;
            display: block;
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        /* Top Right Controls */
        .top-controls {
            position: fixed;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .top-controls {
                top: 1rem;
                right: 1rem;
                gap: 0.5rem;
            }

            .music-control,
            .github-link {
                width: 40px;
                height: 40px;
            }

            .music-control svg {
                width: 16px;
                height: 16px;
            }

            .github-link svg {
                width: 20px;
                height: 20px;
            }
        }

        /* Top Left Team Logo */
        .team-logo-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1001;
            padding: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            height: 50px; /* top-controls 버튼과 동일한 높이 기준 */
        }

        .team-logo-btn img {
            height: 160px;
            width: auto;
            display: block;
            transition: transform 0.2s ease, opacity 0.2s ease;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.5));
        }

        .team-logo-btn:hover img {
            transform: scale(1.06);
            opacity: 0.85;
        }

        @media (max-width: 768px) {
            .team-logo-btn {
                top: 1rem;
                left: 1rem;
            }
            .team-logo-btn img {
                height: 90px;
            }
        }

        .music-control {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .music-control:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .music-control svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
        }

        .github-link {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .github-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .github-link svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
        }



        /* GitHub Dropdown */
        .github-dropdown {
            position: fixed;
            top: 6rem;
            right: 2rem;
            width: 250px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(-10px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .github-dropdown.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .github-option {
            display: flex;
            align-items: center;
            padding: 1rem;
            text-decoration: none;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s ease;
        }

        .github-option:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .github-option:last-child {
            border-bottom: none;
        }

        .github-option svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            margin-right: 0.75rem;
        }

        .github-info {
            display: flex;
            flex-direction: column;
        }

        .github-name {
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .github-role {
            font-size: 0.8rem;
            color: #888888;
        }





        /* Responsive */
        @media (max-width: 768px) {
            .hero-section {
                align-items: center !important;
                padding: 0 !important;
                justify-content: center !important;
            }

            .main-title {
                font-size: 3rem;

                overflow: hidden;
            }

            .coming-soon {

            .countdown-item {
                min-width: 70px;
            }

            .countdown-number {
                font-size: 3.2rem;
            }

            .countdown-sep {
                font-size: 2.5rem;

        }

        @media (max-width: 480px) {
            .hero-section {
                align-items: center !important;

            .main-title {

            }

            .countdown-number {
                font-size: 2.2rem;
            }

            .countdown-sep {
                font-size: 1.8rem;
            }
        }

    </style>

    <script>
        // 타이핑 효과: AI HEALTHCARE -> TEAMFRAMING -> SURGIFLOW 순환
        function typeText() {
            const texts = ["AI HEALTHCARE", "TEAMFRAMING", "SURGIFLOW"];
            const typingElement = document.getElementById('typing-text');

            const params = new URLSearchParams(window.location.search);
            const timeAttack = params.get('timeattack') === '1' || params.get('timeattack') === 'true';

            let textIndex = 0;
            let charIndex = 0;
            let deleting = false;

            // 기본(정상 모드) vs 타임어택 모드별 속도/대기 조절
            const typeSpeed = timeAttack ? 60 : 100; // 타이핑 속도(ms)
            const deleteSpeed = timeAttack ? 30 : 60; // 삭제 속도(ms)
            const pauseAfterType = timeAttack ? 600 : 2500; // 한 단어 다 쓴 뒤 대기(ms)
            const pauseAfterDelete = timeAttack ? 120 : 500; // 모두 지운 뒤 다음 단어까지 대기(ms)

            function tick() {
                const fullText = texts[textIndex];

                if (!deleting) {
                    // 타이핑
                    charIndex++;
                    typingElement.textContent = fullText.substring(0, charIndex);

                    if (charIndex >= fullText.length) {
                        deleting = true;
                        setTimeout(tick, pauseAfterType);
                    } else {
                        setTimeout(tick, typeSpeed);
                    }
                    return;
                }

                // 삭제
                charIndex = Math.max(0, charIndex - 1);
                typingElement.textContent = fullText.substring(0, charIndex);

                if (charIndex === 0) {
                    deleting = false;
                    textIndex = (textIndex + 1) % texts.length;
                    setTimeout(tick, pauseAfterDelete);
                } else {
                    setTimeout(tick, deleteSpeed);
                }
            }

            tick();
        }

        // 카운트다운 타이머
        // 기본: "지금 기준으로 약 1달 뒤"에 LAUNCHED 표시
        // 타임어택: URL에 ?timeattack=1 를 붙이면 몇 초 뒤에 바로 LAUNCHED로 전환
        function updateCountdown() {
            const params = new URLSearchParams(window.location.search);
            const timeAttack = params.get('timeattack') === '1' || params.get('timeattack') === 'true';
            const attackSeconds = Number(params.get('timeattack_seconds') || 30); // 기본 30초

            // 새로고침해도 리셋되지 않게:
            // "목표 시각(launchAt)"을 localStorage에 고정해두고 이후 로드에서는 그 값을 사용합니다.
            const modeKey = 'teamframing_countdown_mode';
            const launchAtKey = 'teamframing_launchAt_ms';
            const timeAttackSecondsKey = 'teamframing_timeattack_seconds';

            let countDownDateMs;
            try {
                const nowMs = Date.now();
                const storedMode = window.localStorage.getItem(modeKey);
                const storedLaunchAt = window.localStorage.getItem(launchAtKey);
                const storedLaunchAtMs = storedLaunchAt ? Number(storedLaunchAt) : NaN;
                const storedAttackSeconds = Number(window.localStorage.getItem(timeAttackSecondsKey));

                if (timeAttack) {
                    // timeattack 모드: 같은 seconds로 들어오는 동안은 목표 시간을 유지
                    if (
                        storedMode === 'timeattack' &&
                        Number.isFinite(storedLaunchAtMs) &&
                        Number.isFinite(storedAttackSeconds) &&
                        storedAttackSeconds === attackSeconds
                    ) {
                        countDownDateMs = storedLaunchAtMs;
                    } else {
                        countDownDateMs = nowMs + attackSeconds * 1000;
                        window.localStorage.setItem(modeKey, 'timeattack');
                        window.localStorage.setItem(launchAtKey, String(countDownDateMs));
                        window.localStorage.setItem(timeAttackSecondsKey, String(attackSeconds));
                    }
                } else {
                    // 기본 모드: 40일 목표 시각을 처음 1회만 고정
                    if (storedMode === 'default40d' && Number.isFinite(storedLaunchAtMs)) {
                        countDownDateMs = storedLaunchAtMs;
                    } else {
                        countDownDateMs = nowMs + 40 * 24 * 60 * 60 * 1000;
                        window.localStorage.setItem(modeKey, 'default40d');
                        window.localStorage.setItem(launchAtKey, String(countDownDateMs));
                        window.localStorage.removeItem(timeAttackSecondsKey);
                    }
                }
            } catch (e) {
                // localStorage 사용 불가 시(프라이빗/차단): 새로고침마다 리셋될 수 있음
                countDownDateMs = timeAttack
                    ? Date.now() + attackSeconds * 1000
                    : Date.now() + 40 * 24 * 60 * 60 * 1000;
            }

            const countDownDate = new Date(countDownDateMs);

            const x = setInterval(function() {
                const now = Date.now();
                const distance = countDownDate.getTime() - now;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // 음수가 되지 않도록 처리
                document.getElementById('days').textContent = Math.max(0, days).toString().padStart(2, '0');
                document.getElementById('hours').textContent = Math.max(0, hours).toString().padStart(2, '0');
                document.getElementById('minutes').textContent = Math.max(0, minutes).toString().padStart(2, '0');
                document.getElementById('seconds').textContent = Math.max(0, seconds).toString().padStart(2, '0');

                if (distance < 0) {
                    clearInterval(x);
                    document.querySelector('.countdown').innerHTML = '<h2>LAUNCHED!</h2>';
                }
            }, 1000);
        }

        // 음악 재생/멈춤 기능 (간단하게)
        function initMusicControl() {
            const musicToggle = document.getElementById('musicToggle');
            const backgroundMusic = document.getElementById('backgroundMusic');
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');
            let isPlaying = false;

            // 볼륨 설정
            backgroundMusic.volume = 0.2;

            // 초기 상태 설정
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';

            // 음악 재생/멈춤 토글
            musicToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                
                // GitHub 드롭다운이 열려있으면 닫기
                document.getElementById('githubDropdown').classList.remove('show');
                
                if (isPlaying) {
                    // 음악 멈춤
                    backgroundMusic.pause();
                    playIcon.style.display = 'block';
                    pauseIcon.style.display = 'none';
                    isPlaying = false;
                    console.log('🔇 음악 멈춤');
                } else {
                    // 음악 재생 (간단하게)
                    console.log('🎵 음악 재생 시도...');
                    backgroundMusic.currentTime = 0; // 처음부터 재생
                    
                    backgroundMusic.play().then(function() {
                        playIcon.style.display = 'none';
                        pauseIcon.style.display = 'block';
                        isPlaying = true;
                        console.log('🎵 음악 재생 성공!');
                    }).catch(function(error) {
                        console.error('❌ 음악 재생 실패:', error);
                        alert('음악 재생 실패: ' + error.message);
                    });
                }
            });

            // 음악 상태 동기화
            backgroundMusic.addEventListener('play', function() {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                isPlaying = true;
            });

            backgroundMusic.addEventListener('pause', function() {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                isPlaying = false;
            });

            // 자동 재생 없음 - 버튼으로만 재생
        }



        // 깃허브 드롭다운 초기화  
        function initGithubDropdown() {
            const githubToggle = document.getElementById('githubToggle');
            const githubDropdown = document.getElementById('githubDropdown');
            
            githubToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                githubDropdown.classList.toggle('show');
            });
        }





        // 외부 클릭 시 드롭다운 닫기
        function initOutsideClick() {
            document.addEventListener('click', function() {
                document.getElementById('githubDropdown').classList.remove('show');
            });
        }

        // 로고 클릭: localStorage 유지한 채 새로고침 (카운트다운 리셋 없음)
        function initLogoBtn() {
            document.getElementById('teamLogoBtn').addEventListener('click', function(e) {
                e.stopPropagation();
                location.reload();
            });
        }

        // 페이지 로드 시 모든 기능 초기화
        document.addEventListener('DOMContentLoaded', function() {
            typeText();
            updateCountdown();
            initMusicControl();
            initGithubDropdown();
            initOutsideClick();
            initLogoBtn();
        });


    </script>
</body>
</html>
