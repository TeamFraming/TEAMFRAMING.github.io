<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEAM FRAMING</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" href="./assets/favicon.png" />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles/index.css" />
    <style>
      :root {
        /* Colors */
        --bg-main: #0f0f0f;
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.35);
        --text-muted: rgba(255, 255, 255, 0.15);
        --border-glass: rgba(255, 255, 255, 0.15);
        --bg-glass: rgba(255, 255, 255, 0.05);
        --accent-glow: rgba(255, 255, 255, 0.1);

        /* Fonts */
        --font-display: "Outfit", sans-serif;

        /* Transitions */
        --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        background: var(--bg-main);
        color: var(--text-primary);
      }

      /* Hero Section */
      .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding-top: 10vh;
        text-align: center;
      }

      .hero__content {
        max-width: 800px;
        width: 100%;
        justify-self: center;
      }

      .hero__title {
        font-size: 5.5rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 0.6rem;
        line-height: 1.1;
        min-height: 7rem;
        white-space: nowrap;
        letter-spacing: -0.02em;
      }

      .hero__cursor {
        animation: blink 1s infinite;
        font-weight: 300;
        opacity: 0.5;
      }

      .hero__status {
        font-size: 1rem;
        font-weight: 500;
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 2rem;
        letter-spacing: 0.45em;
        text-transform: uppercase;
      }

      /* Header & Navigation */
      .site-header {
        position: fixed;
        top: 2rem;
        left: 2rem;
        right: 2rem;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        pointer-events: none;
      }

      .site-header > * {
        pointer-events: auto;
      }

      /* Logo Area */
      .site-header__logo {
        display: flex;
        align-items: center;
      }

      .logo-button {
        padding: 0;
        border: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        background: none;
        transition: var(--transition-smooth);
      }

      .logo-button img {
        height: 40px;
        width: auto;
        max-width: 100%;
        object-fit: contain;
        flex-shrink: 0;
        filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.5));
      }

      .logo-button:hover {
        transform: translateY(-2px) scale(1.05);
        opacity: 0.85;
      }

      /* Top Nav Controls */
      .site-nav {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 1rem;
      }

      .site-nav__group {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .site-nav__button {
        width: 50px;
        height: 50px;
        background: var(--bg-glass);
        border: 1px solid var(--border-glass);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: var(--transition-smooth);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 0;
        cursor: pointer;
      }

      .site-nav__button:hover {
        background: var(--accent-glow);
        transform: translateY(-2px) scale(1.05);
        border-color: var(--text-primary);
      }

      .site-nav__button svg {
        width: 24px;
        height: 24px;
        fill: var(--text-primary);
      }

      /* Dropdown Menu */
      .dropdown-menu {
        width: 250px;
        background: rgba(10, 10, 10, 0.85);
        border-radius: 16px;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border-glass);
        transform: translateY(-12px);
        opacity: 0;
        pointer-events: none;
        transition: var(--transition-smooth);
        z-index: 999;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .dropdown-menu.show {
        transform: translateY(0);
        opacity: 1;
        pointer-events: all;
      }

      .dropdown-menu__item {
        display: flex;
        align-items: center;
        padding: 1.25rem;
        text-decoration: none;
        color: var(--text-primary);
        border-bottom: 1px solid var(--border-glass);
        transition: background 0.2s ease;
      }

      .dropdown-menu__item:hover {
        background: var(--bg-glass);
      }

      .dropdown-menu__item:last-child {
        border-bottom: none;
      }

      .dropdown-menu__item svg {
        width: 20px;
        height: 20px;
        fill: var(--text-primary);
        margin-right: 1rem;
      }

      .dropdown-menu__info {
        display: flex;
        flex-direction: column;
      }

      .dropdown-menu__name {
        font-weight: 600;
        margin-bottom: 0.2rem;
        font-size: 0.95rem;
      }

      .dropdown-menu__role {
        font-size: 0.75rem;
        color: #888888;
      }

      /* Countdown */
      .countdown-wrapper {
        text-align: center;
        margin-bottom: 6rem;
      }

      .countdown {
        display: inline-flex;
        align-items: flex-start;
      }

      .countdown__item {
        text-align: center;
        min-width: 110px;
      }

      .countdown__separator {
        font-family: var(--font-display);
        font-size: 2.5rem;
        font-weight: 200;
        color: var(--text-muted);
        line-height: 1;
        padding: 0 0.2rem;
        margin-top: 0.1rem;
        user-select: none;
      }

      .countdown__value {
        font-family: var(--font-display);
        font-size: 3.5rem;
        font-weight: 300;
        display: block;
        line-height: 1;
        margin-bottom: 0.5rem;
        letter-spacing: 0.04em;
        color: var(--text-primary);
      }

      .countdown__label {
        font-family: var(--font-display);
        font-size: 0.6rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.35em;
        font-weight: 400;
        display: block;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .site-header {
          top: 1.5rem;
          left: 1.5rem;
          right: 1.5rem;
        }

        .logo-button img {
          height: 32px;
        }

        .hero__title {
          font-size: 3.5rem;
          min-height: 4.5rem;
        }

        .countdown__item {
          min-width: 80px;
        }

        .countdown__value {
          font-size: 2.8rem;
        }
      }

      @media (max-width: 480px) {
        .hero__title {
          font-size: 2.5rem;
          min-height: 3.5rem;
        }

        .countdown__item {
          min-width: 60px;
        }

        .countdown__value {
          font-size: 2rem;
        }
      }
    </style>
  </head>

    <main>
      <section class="hero">
        <div class="container">
          <div class="hero__content">
            <!-- Main Title with Typing Effect -->
            <h1 class="hero__title">
              <span id="typingText"></span>
              <span class="hero__cursor" aria-hidden="true">|</span>
            </h1>
            <p class="hero__status">COMING SOON</p>

            <!-- Countdown -->
            <div class="countdown-wrapper">
              <div class="countdown" role="timer" aria-label="Launch countdown">
                <div class="countdown__item">
                  <span class="countdown__value" id="days">00</span>
                  <span class="countdown__label">Days</span>
                </div>
                <span class="countdown__separator" aria-hidden="true">:</span>
                <div class="countdown__item">
                  <span class="countdown__value" id="hours">00</span>
                  <span class="countdown__label">Hours</span>
                </div>
                <span class="countdown__separator" aria-hidden="true">:</span>
                <div class="countdown__item">
                  <span class="countdown__value" id="minutes">00</span>
                  <span class="countdown__label">Min</span>
                </div>
                <span class="countdown__separator" aria-hidden="true">:</span>
                <div class="countdown__item">
                  <span class="countdown__value" id="seconds">00</span>
                  <span class="countdown__label">Sec</span>
                </div>
              </div>
            </div>
            <a href="./surgiflow-product.html" class="launch-button">
              Go surgiflow
            </a>
          </div>
        </div>
      </section>

  <script>
    /**
     * TEAM FRAMING Configuration
     */
    const TF_CONFIG = {
      typing: {
        texts: ["AI HEALTHCARE", "TEAMFRAMING", "SURGIFLOW"],
        targetId: "typingText",
        modes: {
          normal: {
            typeSpeed: 100,
            deleteSpeed: 60,
            pauseAfterType: 2500,
            pauseAfterDelete: 500,
          },
          attack: {
            typeSpeed: 60,
            deleteSpeed: 30,
            pauseAfterType: 600,
            pauseAfterDelete: 120,
          },
        },
      },
      countdown: {
        storageKeys: {
          mode: "tf_mode",
          launchTime: "tf_launch",
          attackSeconds: "tf_attack_sec",
        },
        defaults: {
          launchDays: 40,
          attackSeconds: 30,
        },
        timeUnits: [
          { id: "days", durationMs: 86400000 },
          { id: "hours", durationMs: 3600000 },
          { id: "minutes", durationMs: 60000 },
          { id: "seconds", durationMs: 1000 },
        ],
      },
      ui: {
        dropdownId: "githubDropdown",
        toggleId: "githubToggle",
        logoId: "teamLogoBtn",
      },
    };

    /**
     * Typing Effect Logic
     */
    function initTypingEffect() {
      const { texts, targetId, modes } = TF_CONFIG.typing;
      const typingElement = document.getElementById(targetId);
      if (!typingElement) return;

      const urlParams = new URLSearchParams(window.location.search);
      const isAttackMode =
        urlParams.get("timeattack") === "1" ||
        urlParams.get("timeattack") === "true";
      const timing = modes[isAttackMode ? "attack" : "normal"];

      let state = { textIndex: 0, charIndex: 0, isDeleting: false };

      function tick() {
        const fullText = texts[state.textIndex];
        const { charIndex, isDeleting } = state;

        if (!isDeleting && charIndex === fullText.length) {
          state.isDeleting = true;
          return setTimeout(tick, timing.pauseAfterType);
        }

        if (isDeleting && charIndex === 0) {
          state.isDeleting = false;
          state.textIndex = (state.textIndex + 1) % texts.length;
          return setTimeout(tick, timing.pauseAfterDelete);
        }

        state.charIndex += isDeleting ? -1 : 1;
        typingElement.textContent = fullText.substring(0, state.charIndex);

        setTimeout(tick, isDeleting ? timing.deleteSpeed : timing.typeSpeed);
      }

      tick();
    }

    /**
     * Countdown Timer Logic
     */
    function initCountdown() {
      const { storageKeys, defaults, timeUnits } = TF_CONFIG.countdown;
      const urlParams = new URLSearchParams(window.location.search);
      const isAttackMode =
        urlParams.get("timeattack") === "1" ||
        urlParams.get("timeattack") === "true";
      const attackSeconds = Number(
        urlParams.get("timeattack_seconds") || defaults.attackSeconds,
      );

      const getLaunchTime = () => {
        const now = Date.now();
        try {
          const storedMode = localStorage.getItem(storageKeys.mode);
          const storedLaunchTime = Number(
            localStorage.getItem(storageKeys.launchTime),
          );
          const storedAttackSeconds = Number(
            localStorage.getItem(storageKeys.attackSeconds),
          );

          const isMatchingState = isAttackMode
            ? storedMode === "attack" && storedAttackSeconds === attackSeconds
            : storedMode === "default";

          if (isMatchingState && !isNaN(storedLaunchTime))
            return storedLaunchTime;

          const newLaunchTime =
            now +
            (isAttackMode ? attackSeconds : defaults.launchDays * 24 * 3600) *
              1000;
          localStorage.setItem(
            storageKeys.mode,
            isAttackMode ? "attack" : "default",
          );
          localStorage.setItem(storageKeys.launchTime, newLaunchTime);

          if (isAttackMode) {
            localStorage.setItem(storageKeys.attackSeconds, attackSeconds);
          } else {
            localStorage.removeItem(storageKeys.attackSeconds);
          }
          return newLaunchTime;
        } catch {
          return (
            now +
            (isAttackMode ? attackSeconds : defaults.launchDays * 24 * 3600) *
              1000
          );
        }
      };

      const launchTimestamp = getLaunchTime();
      const timerInterval = setInterval(() => {
        const timeDifference = launchTimestamp - Date.now();

        if (timeDifference < 0) {
          clearInterval(timerInterval);
          const countdownContainer = document.querySelector(".countdown");
          if (countdownContainer)
            countdownContainer.innerHTML = "<h2>LAUNCHED!</h2>";
          return;
        }

        let remainingMs = timeDifference;
        timeUnits.forEach((unit) => {
          const unitValue = Math.floor(remainingMs / unit.durationMs);
          remainingMs %= unit.durationMs;
          const unitElement = document.getElementById(unit.id);
          if (unitElement) {
            unitElement.textContent = String(Math.max(0, unitValue)).padStart(
              2,
              "0",
            );
          }
        });
      }, 1000);
    }

    /**
     * UI Events & Interactions
     */
    function initUIEvents() {
      const { dropdownId, toggleId, logoId } = TF_CONFIG.ui;
      const dropdown = document.getElementById(dropdownId);
      if (!dropdown) return;

      const handlers = {
        toggle: (e) => {
          e.stopPropagation();
          dropdown.classList.toggle("show");
        },
        close: () => dropdown.classList.remove("show"),
        reload: (e) => {
          e.stopPropagation();
          location.reload();
        },
      };

      const eventBindings = [
        { id: toggleId, type: "click", handler: handlers.toggle },
        { id: logoId, type: "click", handler: handlers.reload },
        { target: document, type: "click", handler: handlers.close },
      ];

      eventBindings.forEach((binding) => {
        const targetElement =
          binding.target || document.getElementById(binding.id);
        if (targetElement) {
          targetElement.addEventListener(binding.type, binding.handler);
        }
      });
    }

    // Initialize all components on load
    document.addEventListener("DOMContentLoaded", () => {
      initTypingEffect();
      initCountdown();
      initUIEvents();
    });
  </script>
